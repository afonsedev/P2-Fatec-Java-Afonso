<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Ninja System</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1 th:text="'Bem-vindo, ' + ${nome} + '!'"></h1>
        <nav class="nav">
            <a href="/ninjas">Ninjas</a>
            <a href="/missoes">Missoes</a>
            <a href="/ninjas/novo">Novo Ninja</a>
            <a href="/missoes/nova">Nova Missao</a>
            <a href="/login">Sair</a>
        </nav>

        <h2>Ninjas Cadastrados</h2>
        <div class="cards-grid" th:if="${!#lists.isEmpty(ninjas)}">
            <div class="battle-card" th:each="ninja : ${ninjas}">
                <div class="card-header">
                    <h3 th:text="${ninja.nome}"></h3>
                    <span class="card-rank" th:text="${ninja.rankNinja}"></span>
                </div>
                <div class="card-body">
                    <div class="card-stat">
                        <span class="stat-label">Idade</span>
                        <span class="stat-value" th:text="${ninja.idade}"></span>
                    </div>
                    <div class="card-stat">
                        <span class="stat-label">Afinidade</span>
                        <span class="stat-value" th:text="${ninja.afinidadeElemental}"></span>
                    </div>
                    <div class="card-stat">
                        <span class="stat-label">Vila</span>
                        <span class="stat-value" th:text="${ninja.vilaNome}"></span>
                    </div>
                    <div class="card-stat">
                        <span class="stat-label">Status</span>
                        <span class="stat-value">
                            <span class="status-badge" th:classappend="'status-' + ${#strings.toLowerCase(ninja.statusNinja)}" th:text="${ninja.statusNinja}"></span>
                        </span>
                    </div>
                </div>
            </div>
        </div>
        <p class="empty-state" th:if="${#lists.isEmpty(ninjas)}">Nenhum ninja cadastrado.</p>
    </div>
</body>
</html>
