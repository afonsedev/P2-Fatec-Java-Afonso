<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Ninja</title>
</head>
<body>
    <h1>Cadastrar Ninja</h1>

    <form action="/ninjas/novo" method="post">
        <label>Nome:</label><br>
        <input type="text" name="nome" required><br><br>

        <label>Idade:</label><br>
        <input type="number" name="idade" min="0" required><br><br>

        <label>Rank:</label><br>
        <select name="rankNinja" required>
            <option value="GENIN">Genin</option>
            <option value="CHUNIN">Chunin</option>
            <option value="JONIN">Jonin</option>
            <option value="KAGE">Kage</option>
        </select><br><br>

        <label>Afinidade Elemental:</label><br>
        <select name="afinidadeElemental" required>
            <option value="FOGO">Fogo</option>
            <option value="AGUA">Água</option>
            <option value="TERRA">Terra</option>
            <option value="VENTO">Vento</option>
            <option value="RAIO">Raio</option>
        </select><br><br>

        <label>Vila:</label><br>
        <select name="vilaId" required>
            <option th:each="vila : ${vilas}" th:value="${vila.id}" th:text="${vila.nome}"></option>
        </select><br><br>

        <input type="hidden" name="usuarioId" value="1">

        <button type="submit">Cadastrar</button>
    </form>

    <br>
    <a href="/ninjas">Voltar para lista</a>
</body>
</html>
