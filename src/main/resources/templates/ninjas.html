<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ninjas</title>
</head>
<body>
    <h1>Lista de Ninjas</h1>

    <a href="/ninjas/novo">Cadastrar novo ninja</a>

    <table border="1" cellpadding="8" cellspacing="0" style="margin-top: 16px;">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Idade</th>
                <th>Rank</th>
                <th>Afinidade</th>
                <th>Status</th>
                <th>Vila</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="ninja : ${ninjas}">
                <td th:text="${ninja.nome}"></td>
                <td th:text="${ninja.idade}"></td>
                <td th:text="${ninja.rankNinja}"></td>
                <td th:text="${ninja.afinidadeElemental}"></td>
                <td th:text="${ninja.statusNinja}"></td>
                <td th:text="${ninja.vilaNome}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(ninjas)}">
                <td colspan="6">Nenhum ninja cadastrado.</td>
            </tr>
        </tbody>
    </table>
</body>
</html>
